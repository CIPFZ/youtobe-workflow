services:
  av-service:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: youtobe-workflow/av-service:full
    container_name: av-service
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - ./data/input:/data/input
      - ./data/output:/data/output
    environment:
      - LD_LIBRARY_PATH=/usr/local/lib
    command: ["/app/av_service"]
